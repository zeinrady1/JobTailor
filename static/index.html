<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JobTailor – Zein Rady</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1a1a24;
    --border: #1e1e2e;
    --primary: #f59e0b;
    --primary-dim: rgba(245,158,11,0.12);
    --text: #e2e8f0;
    --muted: #64748b;
    --success: #22c55e;
    --error: #ef4444;
    --header-h: 56px;
    --nav-h: 64px;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

  /* ── HEADER ── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    height: var(--header-h);
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 0 20px; display: flex; align-items: center; gap: 10px;
  }
  header h1 { font-size: 18px; font-weight: 700; color: var(--primary); }
  .sub { color: var(--muted); font-size: 13px; }

  /* ── PANELS ── */
  /*
    On mobile:
      .app is a fixed box below header, above nav.
      Each .panel fills that box completely.
      Only .active panel is visible.

    On desktop:
      .app is a fixed box below header, reaching the bottom.
      Two panels side-by-side via CSS grid, both always visible.
  */
  .app {
    position: fixed;
    top: var(--header-h); left: 0; right: 0; bottom: var(--nav-h);
  }

  /* Each panel fills .app by default (mobile stacking) */
  .panel {
    position: absolute; inset: 0;
    display: none; flex-direction: column;
    overflow: hidden;
  }
  .panel.active { display: flex; }

  /* ── DESKTOP overrides ── */
  @media (min-width: 768px) {
    .app { bottom: 0; position: fixed; display: grid; grid-template-columns: 360px 1fr; }
    .bottom-nav { display: none; }

    /* Both panels always visible; override absolute positioning */
    .panel {
      position: static !important;
      display: flex !important;
    }
    #panel-left { border-right: 1px solid var(--border); }
  }

  /* ── TAB STRIP (desktop left column) ── */
  .tab-strip { display: none; flex-shrink: 0; border-bottom: 1px solid var(--border); }
  @media (min-width: 768px) { .tab-strip { display: flex; } }

  .tab {
    flex: 1; padding: 13px; text-align: center;
    font-size: 13px; font-weight: 600; cursor: pointer;
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--muted); font-family: inherit; transition: all 0.15s;
  }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  /* ── TAB PANES inside left panel ── */
  /* Hidden by default on both mobile and desktop */
  .tab-pane { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .tab-pane.active { display: flex; }

  /* Fixed top section (inputs + button) inside a tab pane */
  .pane-top {
    padding: 14px; display: flex; flex-direction: column;
    gap: 10px; flex-shrink: 0; border-bottom: 1px solid var(--border);
  }

  /* Scrollable list section */
  .pane-list {
    flex: 1; min-height: 0; overflow-y: auto;
    padding: 12px 14px 14px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .pane-list::-webkit-scrollbar { width: 4px; }
  .pane-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Scrollable form section (paste panel) */
  .pane-form {
    flex: 1; min-height: 0; overflow-y: auto;
    padding: 14px; display: flex; flex-direction: column; gap: 10px;
  }
  .pane-form::-webkit-scrollbar { width: 4px; }
  .pane-form::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--nav-h); background: var(--surface);
    border-top: 1px solid var(--border); display: flex; z-index: 50;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    background: none; border: none; color: var(--muted);
    font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: color 0.15s;
  }
  .nav-btn .ico { font-size: 22px; }
  .nav-btn.active { color: var(--primary); }

  /* ── INPUTS ── */
  input, textarea {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 11px 14px;
    font-size: 14px; font-family: inherit; outline: none; width: 100%;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus { border-color: var(--primary); }
  textarea { resize: vertical; line-height: 1.5; }
  ::placeholder { color: var(--muted); }

  /* ── BUTTONS ── */
  .btn {
    padding: 12px 18px; border-radius: 10px; font-size: 14px;
    font-weight: 600; cursor: pointer; border: none; font-family: inherit;
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px; transition: all 0.15s; white-space: nowrap;
  }
  .btn-p { background: var(--primary); color: #000; }
  .btn-p:hover:not(:disabled) { background: #d97706; }
  .btn-p:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-o { background: transparent; color: var(--primary); border: 1.5px solid var(--primary); }
  .btn-o:hover { background: var(--primary-dim); }
  .btn-g { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-g:hover { color: var(--text); }
  .btn-w { width: 100%; }

  /* ── LAYOUT HELPERS ── */
  .row { display: flex; gap: 8px; }
  .row > input:first-child { flex: 1; min-width: 0; }

  /* ── JOB CARDS ── */
  .job-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 11px; padding: 13px; cursor: pointer;
    transition: border-color 0.15s; flex-shrink: 0;
  }
  .job-card:hover { border-color: rgba(245,158,11,0.4); }
  .job-card.sel { border-color: var(--primary); background: var(--primary-dim); }
  .jc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 3px; }
  .jc-title { font-weight: 600; font-size: 14px; line-height: 1.3; }
  .jc-src { font-size: 11px; font-weight: 700; color: var(--primary); background: var(--primary-dim); border: 1px solid rgba(245,158,11,0.25); padding: 2px 7px; border-radius: 5px; flex-shrink: 0; }
  .jc-meta { font-size: 12px; color: var(--muted); }
  .jc-sal { font-size: 12px; color: var(--success); font-weight: 500; margin-top: 2px; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; color: var(--muted); padding: 44px 20px; font-size: 13px; line-height: 1.7; }
  .empty .ico { font-size: 36px; margin-bottom: 10px; opacity: 0.35; }

  /* ── RESULTS PANEL ── */
  .res-hdr {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-shrink: 0;
  }
  .res-hdr h2 { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dl-row { display: flex; gap: 8px; flex-shrink: 0; }
  .dl-row .btn { padding: 9px 14px; font-size: 13px; }

  .res-body {
    flex: 1; min-height: 0; overflow-y: auto;
    padding: 20px; display: flex; flex-direction: column; gap: 22px;
  }
  .res-body::-webkit-scrollbar { width: 4px; }
  .res-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sec-h { font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .kws { display: flex; flex-wrap: wrap; gap: 6px; }
  .kw { background: var(--primary-dim); border: 1px solid rgba(245,158,11,0.3); color: var(--primary); padding: 4px 10px; border-radius: 20px; font-size: 12px; }

  .cover-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 11px; padding: 18px; font-size: 14px;
    line-height: 1.75; color: var(--text); white-space: pre-wrap;
  }
  .preview-desc {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 11px; padding: 14px; font-size: 13px;
    line-height: 1.65; color: var(--muted); max-height: 280px; overflow-y: auto;
  }

  /* ── PLACEHOLDER ── */
  .placeholder {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: var(--muted); text-align: center;
    padding: 32px; font-size: 14px; line-height: 1.65;
  }
  .big { font-size: 52px; opacity: 0.2; }

  /* ── STATUS ── */
  .status {
    padding: 9px 20px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--muted); flex-shrink: 0;
    min-height: 38px; display: flex; align-items: center;
  }
  .status.ok { color: var(--success); }
  .status.err { color: var(--error); }

  /* ── SPINNER ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.2); border-top-color: #000;
    border-radius: 50%; animation: spin 0.65s linear infinite;
  }

  a.lnk { color: var(--primary); font-size: 13px; text-decoration: none; }
  a.lnk:hover { text-decoration: underline; }
  .count { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>

<header>
  <h1>⚡ JobTailor</h1>
  <span class="sub">AI-powered resume &amp; cover letter tailoring</span>
</header>

<div class="app">

  <!-- ══ PANEL LEFT: Find Jobs + Paste ══ -->
  <div class="panel active" id="panel-left">

    <div class="tab-strip">
      <button class="tab active" id="tab-search" onclick="switchTab('search')">🔍 Find Jobs</button>
      <button class="tab"        id="tab-paste"  onclick="switchTab('paste')">📋 Paste Job</button>
    </div>

    <!-- Search tab pane -->
    <div class="tab-pane active" id="tp-search">
      <div class="pane-top">
        <div class="row">
          <input id="sq" placeholder="e.g. aerospace engineer, GNC" onkeydown="if(event.key==='Enter')doSearch()" />
          <input id="sl" placeholder="Location" style="width:115px;flex-shrink:0" onkeydown="if(event.key==='Enter')doSearch()" />
        </div>
        <button class="btn btn-p btn-w" id="search-btn" onclick="doSearch()">Search Jobs</button>
        <div class="count" id="job-count" style="display:none"></div>
      </div>
      <div class="pane-list" id="job-list">
        <div class="empty"><div class="ico">🔍</div>Search USAJobs &amp; Adzuna.<br>Great for NASA, FAA, DoD &amp; private sector roles.</div>
      </div>
    </div>

    <!-- Paste tab pane -->
    <div class="tab-pane" id="tp-paste">
      <div class="pane-form">
        <div class="row">
          <input id="url-in" placeholder="Paste a job URL to auto-extract…" />
          <button class="btn btn-g" onclick="fetchUrl()" style="padding:11px 14px;flex-shrink:0">Fetch</button>
        </div>
        <input id="pt" placeholder="Job title (optional)" />
        <input id="pc" placeholder="Company name (optional)" />
        <textarea id="pd" placeholder="Paste the full job description here…" rows="11"></textarea>
        <button class="btn btn-p btn-w" onclick="tailorFromPaste()">✨ Generate Resume + Cover Letter</button>
      </div>
      <div class="status" id="paste-status" style="border-top:1px solid var(--border)">Ready</div>
    </div>

  </div>

  <!-- ══ PANEL RIGHT: Results ══ -->
  <div class="panel" id="panel-results">
    <div class="res-hdr">
      <h2 id="res-title">Results</h2>
      <div class="dl-row" id="dl-row" style="display:none">
        <button class="btn btn-p" onclick="dl('resume')">⬇ Resume</button>
        <button class="btn btn-o" onclick="dl('cover')">⬇ Cover</button>
      </div>
    </div>
    <div class="res-body" id="res-body">
      <div class="placeholder">
        <div class="big">🚀</div>
        <div>Search for a job or paste a description<br>to generate your tailored resume and cover letter.</div>
      </div>
    </div>
    <div class="status" id="res-status">Ready</div>
  </div>

</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-search"  onclick="mobileTo('search')"><span class="ico">🔍</span>Find Jobs</button>
  <button class="nav-btn"        id="nav-paste"   onclick="mobileTo('paste')"><span class="ico">📋</span>Paste</button>
  <button class="nav-btn"        id="nav-results" onclick="mobileTo('results')"><span class="ico">✨</span>Results</button>
</nav>

<script>
let jobs = [];
let session = null;

// ── Mobile nav ──────────────────────────────────────────────────
function mobileTo(dest) {
  const toLeft = dest === 'search' || dest === 'paste';
  document.getElementById('panel-left').classList.toggle('active', toLeft);
  document.getElementById('panel-results').classList.toggle('active', !toLeft);
  ['search','paste','results'].forEach(n =>
    document.getElementById('nav-' + n).classList.toggle('active', n === dest));
  if (toLeft) switchTab(dest);
}

// ── Desktop tab switch ──────────────────────────────────────────
function switchTab(name) {
  ['search','paste'].forEach(n => {
    document.getElementById('tab-' + n).classList.toggle('active', n === name);
    document.getElementById('tp-' + n).classList.toggle('active', n === name);
  });
}

// ── Search ──────────────────────────────────────────────────────
async function doSearch() {
  const q = g('sq'); if (!q) return;
  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Searching…';
  st('search', 'Searching job boards…');

  try {
    const r = await fetch('/api/search?query=' + enc(q) + '&location=' + enc(g('sl')));
    const d = await r.json();
    jobs = d.jobs || [];
    renderList();
    st('search', 'Found ' + jobs.length + ' result' + (jobs.length !== 1 ? 's' : ''));
  } catch (e) {
    st('search', 'Search failed — check your connection.', 'err');
    jobs = [];
    renderList();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search Jobs';
  }
}

function renderList() {
  const cnt = document.getElementById('job-count');
  const list = document.getElementById('job-list');
  if (!jobs.length) {
    cnt.style.display = 'none';
    list.innerHTML = '<div class="empty"><div class="ico">🔍</div>No results. Try different keywords.</div>';
    return;
  }
  cnt.textContent = jobs.length + ' results';
  cnt.style.display = 'block';
  list.innerHTML = jobs.map((j, i) => `
    <div class="job-card" id="jc${i}" onclick="pick(${i})">
      <div class="jc-top">
        <div class="jc-title">${x(j.title)}</div>
        <span class="jc-src">${x(j.source)}</span>
      </div>
      <div class="jc-meta">${x(j.company)}${j.location ? ' · ' + x(j.location) : ''}${j.date ? ' · ' + j.date : ''}</div>
      ${j.salary ? '<div class="jc-sal">' + x(j.salary) + '</div>' : ''}
    </div>`).join('');
}

function pick(i) {
  document.querySelectorAll('.job-card').forEach(c => c.classList.remove('sel'));
  document.getElementById('jc' + i)?.classList.add('sel');
  const j = jobs[i];
  showPreview(j);
  if (window.innerWidth < 768) mobileTo('results');
}

function showPreview(j) {
  document.getElementById('res-title').textContent = j.title || 'Job Preview';
  document.getElementById('dl-row').style.display = 'none';
  document.getElementById('res-body').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:14px">
      <div>
        <div style="font-size:15px;font-weight:600;margin-bottom:4px">${x(j.company)}${j.location ? ' · ' + x(j.location) : ''}</div>
        <div style="font-size:13px;color:var(--muted)">${j.salary ? '<span style="color:var(--success)">' + x(j.salary) + '</span>' + (j.date ? ' · ' : '') : ''}${j.date ? 'Posted ' + j.date : ''}</div>
      </div>
      ${j.url ? '<a href="' + x(j.url) + '" target="_blank" class="lnk">View original posting ↗</a>' : ''}
      <div class="preview-desc">${x((j.description||'No description.').substring(0,3000))}</div>
      <button class="btn btn-p btn-w" onclick="tailorFromJob(${jobs.indexOf(j)})">✨ Generate Tailored Resume + Cover Letter</button>
    </div>`;
  st('results', 'Click Generate to tailor your resume for this job.');
}

function tailorFromJob(i) {
  const j = jobs[i];
  if (!j) return;
  runTailor(j.description || '', j.title, j.company);
}

// ── Paste ───────────────────────────────────────────────────────
async function fetchUrl() {
  const url = g('url-in'); if (!url) return;
  st('paste', 'Fetching…');
  try {
    const r = await fetch('/api/fetch-job?url=' + enc(url));
    const d = await r.json();
    document.getElementById('pd').value = d.description || '';
    st('paste', 'Extracted — review then generate.');
  } catch {
    st('paste', 'Could not fetch URL. Paste manually.', 'err');
  }
}

async function tailorFromPaste() {
  const desc = g('pd');
  if (!desc) { st('paste', 'Please paste a job description first.', 'err'); return; }
  if (window.innerWidth < 768) mobileTo('results');
  runTailor(desc, g('pt'), g('pc'));
}

// ── Core tailor ─────────────────────────────────────────────────
async function runTailor(desc, title, company) {
  document.getElementById('dl-row').style.display = 'none';
  document.getElementById('res-title').textContent = 'Generating…';
  document.getElementById('res-body').innerHTML = `
    <div class="placeholder">
      <div class="big" style="opacity:0.5">✨</div>
      <div>Claude is tailoring your resume…<br><span style="font-size:12px;color:var(--muted)">~15–25 seconds</span></div>
    </div>`;
  st('results', 'Analyzing the job and tailoring your resume…');

  try {
    const r = await fetch('/api/tailor', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({job_description: desc, job_title: title||'', company: company||''})
    });
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();
    session = d;
    document.getElementById('res-title').textContent = title || 'Tailored Results';
    document.getElementById('dl-row').style.display = 'flex';
    document.getElementById('res-body').innerHTML = `
      <div>
        <div class="sec-h">Keywords Matched (${d.keywords?.length||0})</div>
        <div class="kws">${(d.keywords||[]).map(k=>'<span class="kw">'+x(k)+'</span>').join('')||'<span style="color:var(--muted);font-size:13px">None detected</span>'}</div>
      </div>
      <div>
        <div class="sec-h">Cover Letter Preview</div>
        <div class="cover-box">${x(d.cover_letter_text||'')}</div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-p" style="flex:1" onclick="dl('resume')">⬇ Resume PDF</button>
        <button class="btn btn-o" style="flex:1" onclick="dl('cover')">⬇ Cover Letter PDF</button>
      </div>`;
    st('results', '✓ Done! Download your tailored resume and cover letter.', 'ok');
  } catch (e) {
    const msg = String(e.message||e).substring(0,300);
    st('results', 'Error: ' + msg, 'err');
    document.getElementById('res-body').innerHTML =
      '<div class="placeholder"><div class="big">❌</div><div style="color:var(--error)">' + x(msg) + '</div></div>';
  }
}

function dl(type) {
  if (!session) return;
  window.open(type==='resume' ? session.resume_url : session.cover_url, '_blank');
}

// ── Status ──────────────────────────────────────────────────────
function st(area, msg, type) {
  const id = area === 'paste' ? 'paste-status' : 'res-status';
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

// ── Utils ───────────────────────────────────────────────────────
function g(id) { return (document.getElementById(id)?.value || '').trim(); }
function enc(s) { return encodeURIComponent(s || ''); }
function x(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
